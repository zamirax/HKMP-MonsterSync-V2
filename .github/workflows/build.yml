name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Mono
      run: sudo apt-get install -y mono-devel

    - name: Download ModdingAPI and HKMP DLLs
      run: |
        mkdir -p Libs

        MODDING_URL=$(curl -s https://api.github.com/repos/hk-modding/api/releases/latest \
          | grep "browser_download_url" \
          | grep -i "windows" \
          | cut -d '"' -f 4 | head -1)
        echo "ModdingAPI URL: $MODDING_URL"
        curl -L "$MODDING_URL" -o ModdingAPI.zip
        unzip -o ModdingAPI.zip -d ModdingAPIExtracted
        find ModdingAPIExtracted -name "*.dll" -exec cp {} Libs/ \;

        HKMP_URL=$(curl -s https://api.github.com/repos/Extremelyd1/HKMP/releases/latest \
          | grep "browser_download_url" \
          | grep -i "\.zip" \
          | cut -d '"' -f 4 | head -1)
        echo "HKMP URL: $HKMP_URL"
        curl -L "$HKMP_URL" -o HKMP.zip
        unzip -o HKMP.zip -d HKMPExtracted
        find HKMPExtracted -name "*.dll" -exec cp {} Libs/ \;

        echo "=== DLLs found ==="
        ls Libs/

    - name: Generate csproj with explicit references
      run: |
        # Build individual Reference entries for every DLL in Libs/
        REFS=""
        for dll in Libs/*.dll; do
          name=$(basename "$dll" .dll)
          REFS="$REFS<Reference Include=\"$name\"><HintPath>$dll</HintPath><Private>false</Private></Reference>"$'\n'
        done

        cat > HollowKnightHKMPMod.csproj << EOF
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net472</TargetFramework>
            <AssemblyTitle>HollowKnightHKMPMod</AssemblyTitle>
            <AssemblyVersion>1.0.0</AssemblyVersion>
          </PropertyGroup>
          <ItemGroup>
            $REFS
          </ItemGroup>
        </Project>
        EOF

        echo "=== Generated csproj ==="
        cat HollowKnightHKMPMod.csproj

    - name: Build
      run: dotnet build --configuration Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: HollowKnightHKMPMod
        path: '**/bin/Release/**/*.dll'
