name: Build Mod
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Install Mono
      run: sudo apt-get install -y mono-devel
    - name: Download ModdingAPI
      run: |
        mkdir -p Libs
        MODDING_URL=$(curl -s https://api.github.com/repos/hk-modding/api/releases/latest \
          | grep "browser_download_url" \
          | grep -i "windows" \
          | cut -d '"' -f 4 | head -1)
        echo "ModdingAPI Windows URL: $MODDING_URL"
        curl -L "$MODDING_URL" -o ModdingAPI.zip
        unzip -o ModdingAPI.zip -d ModdingAPIExtracted
        find ModdingAPIExtracted -name "*.dll" | while read f; do
          echo "Found: $f"
          cp "$f" Libs/
        done
        MODDING_LINUX_URL=$(curl -s https://api.github.com/repos/hk-modding/api/releases/latest \
          | grep "browser_download_url" \
          | grep -iv "windows" \
          | grep "\.zip" \
          | cut -d '"' -f 4 | head -1)
        echo "ModdingAPI Linux URL: $MODDING_LINUX_URL"
        curl -L "$MODDING_LINUX_URL" -o ModdingAPILinux.zip
        unzip -o ModdingAPILinux.zip -d ModdingAPILinuxExtracted
        find ModdingAPILinuxExtracted -name "*.dll" | while read f; do
          echo "Found: $f"
          cp "$f" Libs/ 2>/dev/null || true
        done
        echo "=== Final Libs after ModdingAPI ==="
        ls -la Libs/
    - name: Download HKMP
      run: |
        HKMP_URL=$(curl -s https://api.github.com/repos/Extremelyd1/HKMP/releases/latest \
          | grep "browser_download_url" \
          | grep -i "\.zip" \
          | cut -d '"' -f 4 | head -1)
        echo "HKMP URL: $HKMP_URL"
        curl -L "$HKMP_URL" -o HKMP.zip
        unzip -o HKMP.zip -d HKMPExtracted
        find HKMPExtracted -name "*.dll" | while read f; do
          echo "Found: $f"
          cp "$f" Libs/
        done
        echo "=== Final Libs contents ==="
        ls -la Libs/
    - name: Generate csproj
      run: |
        python3 << 'PYEOF'
        import os
        import glob
        dlls = glob.glob('Libs/*.dll')
        refs = '\n'.join(
            f'    <Reference Include="{os.path.basename(d)[:-4]}">'
            f'<HintPath>{d}</HintPath>'
            f'<Private>false</Private></Reference>'
            for d in dlls
        )
        csproj = f'''<Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net472</TargetFramework>
            <LangVersion>9.0</LangVersion>
            <AssemblyTitle>HollowKnightHKMPMod</AssemblyTitle>
            <AssemblyVersion>1.0.0</AssemblyVersion>
          </PropertyGroup>
          <ItemGroup>
        {refs}
          </ItemGroup>
        </Project>'''
        with open('HollowKnightHKMPMod.csproj', 'w') as f:
            f.write(csproj)
        print("=== Generated csproj ===")
        print(csproj)
        print(f"=== Referenced {len(dlls)} DLLs ===")
        for d in dlls:
            print(d)
        PYEOF
    - name: Build
      run: dotnet build --configuration Release
    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: HollowKnightHKMPMod
        path: "**/HollowKnightHKMPMod.dll"
        if-no-files-found: error
