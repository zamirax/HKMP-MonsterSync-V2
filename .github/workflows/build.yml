name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Mono
      run: sudo apt-get install -y mono-devel

    - name: Download ModdingAPI
      run: |
        mkdir -p Libs

        MODDING_URL=$(curl -s https://api.github.com/repos/hk-modding/api/releases/latest \
          | grep "browser_download_url" \
          | grep -i "windows" \
          | cut -d '"' -f 4 | head -1)
        echo "ModdingAPI URL: $MODDING_URL"
        curl -L "$MODDING_URL" -o ModdingAPI.zip
        unzip -o ModdingAPI.zip -d ModdingAPIExtracted

        # Copy ALL dlls recursively — catches nested folders
        find ModdingAPIExtracted -name "*.dll" | while read f; do
          echo "Found: $f"
          cp "$f" Libs/
        done

    - name: Download HKMP
      run: |
        HKMP_URL=$(curl -s https://api.github.com/repos/Extremelyd1/HKMP/releases/latest \
          | grep "browser_download_url" \
          | grep -i "\.zip" \
          | cut -d '"' -f 4 | head -1)
        echo "HKMP URL: $HKMP_URL"
        curl -L "$HKMP_URL" -o HKMP.zip
        unzip -o HKMP.zip -d HKMPExtracted

        find HKMPExtracted -name "*.dll" | while read f; do
          echo "Found: $f"
          cp "$f" Libs/
        done

        echo "=== Final Libs contents ==="
        ls -la Libs/

    - name: Generate csproj
      run: |
        python3 << 'PYEOF'
        import os
        import glob

        dlls = glob.glob('Libs/*.dll')
        refs = '\n'.join(
            f'    <Reference Include="{os.path.basename(d)[:-4]}">'
            f'<HintPath>{d}</HintPath>'
            f'<Private>false</Private></Reference>'
            for d in dlls
        )

        csproj = f'''<Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net472</TargetFramework>
            <LangVersion>9.0</LangVersion>
            <AssemblyTitle>HollowKnightHKMPMod</AssemblyTitle>
            <AssemblyVersion>1.0.0</AssemblyVersion>
          </PropertyGroup>
          <ItemGroup>
        {refs}
          </ItemGroup>
        </Project>'''

        with open('HollowKnightHKMPMod.csproj', 'w') as f:
            f.write(csproj)

        print("=== Generated csproj ===")
        print(csproj)
        print(f"=== Referenced {len(dlls)} DLLs ===")
        for d in dlls:
            print(d)
        PYEOF
