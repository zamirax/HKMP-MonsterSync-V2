name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Mono
      run: sudo apt-get install -y mono-devel

    - name: Download ModdingAPI DLLs
      run: |
        mkdir -p Libs
        curl -L "https://github.com/hk-modding/api/releases/download/v74/moddingapi.v74.windows.zip" -o ModdingAPI.zip
        file ModdingAPI.zip
        unzip -o ModdingAPI.zip -d ModdingAPIExtracted
        find ModdingAPIExtracted -name "*.dll" -exec cp {} Libs/ \;
        ls Libs/

    - name: Download HKMP DLLs
      run: |
        curl -L "https://github.com/Extremelyd1/HKMP/releases/latest/download/HKMP.zip" -o HKMP.zip
        file HKMP.zip
        unzip -o HKMP.zip -d HKMPExtracted
        find HKMPExtracted -name "*.dll" -exec cp {} Libs/ \;
        ls Libs/

    - name: Update csproj to use local DLLs
      run: |
        cat > HollowKnightHKMPMod.csproj << 'EOF'
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net472</TargetFramework>
            <AssemblyTitle>HollowKnightHKMPMod</AssemblyTitle>
            <AssemblyVersion>1.0.0</AssemblyVersion>
          </PropertyGroup>
          <ItemGroup>
            <Reference Include="*.dll">
              <HintPath>Libs/%(Filename)%(Extension)</HintPath>
              <Private>false</Private>
            </Reference>
          </ItemGroup>
        </Project>
        EOF

    - name: Build
      run: dotnet build --configuration Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: HollowKnightHKMPMod
        path: '**/bin/Release/**/*.dll'
